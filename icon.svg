<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="16" fill="#6C5CE7"/>
  <!-- Diamond (Mermaid decision node) -->
  <polygon points="50,18 74,50 50,82 26,50" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
  <!-- Connector lines from diamond -->
  <line x1="50" y1="10" x2="50" y2="18" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="50" y1="82" x2="50" y2="90" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Magnifying glass -->
  <circle cx="50" cy="50" r="14" fill="none" stroke="#FFD700" stroke-width="3.5"/>
  <line x1="60" y1="60" x2="72" y2="72" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
</svg>
